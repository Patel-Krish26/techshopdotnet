<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <title>Login - Tech Shop</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Animate CSS -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css" />

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #ff9a9e 0%, #fad0c4 100%);
            overflow-x: hidden;
        }

        /* Navbar */
        .navbar {
            background: rgba(0, 0, 0, 0.8) !important;
            backdrop-filter: blur(8px);
        }

        .navbar-brand {
            font-size: 1.8rem;
            letter-spacing: 1px;
            color: #fff !important;
        }

        .nav-link {
            transition: all 0.3s ease;
        }

            .nav-link:hover {
                color: #ffdd59 !important;
                transform: scale(1.1);
            }

        /* Container */
        .logsign-container {
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 100px 15px 50px;
        }

        /* Card */
        .loginCard {
            max-width: 450px;
            width: 100%;
            background: rgba(0, 0, 0, 0.7);
            border-radius: 20px;
            overflow: hidden;
            animation: fadeInUp 1s ease forwards;
        }

            .loginCard .card-body {
                padding: 2rem;
            }

            .loginCard h2 {
                font-weight: 700;
                letter-spacing: 1px;
                color: #fff;
            }

        /* Inputs */
        .loginInput {
            border-radius: 12px;
            border: none;
            padding: 12px 15px;
            transition: all 0.3s ease;
        }

            .loginInput:focus {
                outline: none;
                box-shadow: 0 0 15px #ffdd59;
                background-color: rgba(255, 255, 255, 0.05);
            }

        /* Button */
        .loginBtn {
            background: linear-gradient(90deg, #ff758c, #ff7eb3);
            border-radius: 12px;
            font-weight: 600;
            transition: all 0.3s ease;
        }

            .loginBtn:hover {
                transform: scale(1.05);
                box-shadow: 0 10px 20px rgba(255, 125, 193, 0.5);
            }

        a.text-white {
            text-decoration: underline;
            transition: all 0.3s ease;
        }

            a.text-white:hover {
                color: #ffdd59 !important;
            }

        /* Animation */
        @keyframes fadeInUp {
            0% {
                opacity: 0;
                transform: translateY(50px);
            }

            100% {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Responsive */
        @media (max-width: 576px) {
            .logsign-container {
                padding: 50px 15px 30px;
            }
        }
    </style>
</head>

<body>

    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-dark fixed-top shadow-lg">
        <div class="container">
            <a class="navbar-brand fw-bold" href="index.html">Tech Shop</a>

            <button class="navbar-toggler" data-bs-toggle="collapse" data-bs-target="#nav">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse" id="nav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
                    <li class="nav-item"><a class="nav-link" href="login.html">Login</a></li>
                    <li class="nav-item"><a class="nav-link" href="Signup.html">Signup</a></li>
                    <li class="nav-item" id="navLogout" style="display:none;">
                        <a class="nav-link" href="#" id="logoutLink">Logout</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- Login Form -->
    <div class="logsign-container">
        <form id="loginform" class="needs-validation logsign animate__animated animate__fadeInUp" novalidate>
            <div class="card shadow loginCard">
                <div class="card-body">

                    <h2 class="text-center mb-3 pb-2">Login</h2>

                    <p class="form-label text-white">Enter Your Email :</p>
                    <input type="email" class="form-control mb-3 loginInput text-black" id="loginEmail" placeholder="Enter Your Email" required>

                    <p class="form-label text-white">Enter Password :</p>
                    <input type="password" class="form-control mb-3 loginInput text-black" id="loginPassword" placeholder="Enter Your Password" required>

                    <button id="loginBtn" class="btn text-white w-100 mt-3 loginBtn">Login</button>

                    <p class="text-center mt-3 text-white">
                        Doesn't have an account?
                        <a href="signup.html" class="text-white">Signup</a>
                    </p>

                </div>
            </div>
        </form>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

    <!-- Login Script -->
    <script>
        const loginBtn = document.getElementById('loginBtn');

        loginBtn.addEventListener('click', async function (e) {
            e.preventDefault();

            const email = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPassword').value;

            if (!email || !password) {
                alert('Please fill all fields');
                return;
            }

            try {
                const response = await fetch('https://techshopapi.onrender.com/api/User/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ email, password })
                });

                if (response.ok) {
                    const data = await response.json();

                    localStorage.setItem('loggedInUser', JSON.stringify(data));
                    localStorage.setItem('userId', data.userId);

                    alert('Login successful! Welcome ' + data.name);

                    window.location.href = 'index.html';
                } else {
                    alert('Invalid email or password');
                }
            } catch (error) {
                console.error(error);
                alert('Server error');
            }
        });
    </script>

</body>
</html>
