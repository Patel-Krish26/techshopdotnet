<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <title>Cart</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">

    <style>

        /* SAME HOME BACKGROUND */
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #ff9a9e 0%, #fad0c4 100%);
            overflow-x: hidden;
        }

        /* NAVBAR SAME */
        .navbar {
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(10px);
        }

        .nav-link:hover {
            color: #ffdd59 !important;
            transform: scale(1.1);
        }

        /* CART CARD = PRODUCT CARD STYLE */
        .cart-card {
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            overflow: hidden;
            transition: 0.4s;
        }

            .cart-card:hover {
                transform: translateY(-10px);
                box-shadow: 0 20px 40px rgba(0,0,0,0.4);
            }

        /* IMAGE SAME STYLE */
        .img-wrapper {
            height: 200px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #111;
        }

            .img-wrapper img {
                max-width: 100%;
                max-height: 100%;
                object-fit: contain;
                transition: 0.3s;
            }

        .cart-card:hover img {
            transform: scale(1.08);
        }

        /* TEXT */
        .card-body {
            padding: 15px;
            text-align: center;
        }

        .card-title {
            color: white;
        }

        .price {
            color: #ffdd59;
            font-weight: bold;
        }

        /* BUTTONS */
        .btn-custom {
            border-radius: 20px;
        }

        /* SUMMARY CARD */
        .summary-card {
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(10px);
            border-radius: 20px;
        }

        /* SCROLL ANIMATION SAME AS HOME */
        .fade-scroll {
            opacity: 0;
            transform: translateY(40px);
            transition: 0.6s;
        }

            .fade-scroll.show {
                opacity: 1;
                transform: translateY(0);
            }
        /* CARD */
        .cart-card {
            background: rgba(0,0,0,0.75);
            backdrop-filter: blur(12px);
            border-radius: 20px;
            overflow: hidden;
            transition: 0.4s;
            width: 100%;
            max-width: 300px;
        }

            .cart-card:hover {
                transform: translateY(-12px) scale(1.02);
                box-shadow: 0 25px 50px rgba(0,0,0,0.5);
            }

        /* IMAGE */
        .img-wrapper {
            height: 200px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #111;
        }

            .img-wrapper img {
                max-width: 100%;
                max-height: 100%;
                object-fit: contain;
                transition: 0.3s;
            }

        .cart-card:hover img {
            transform: scale(1.1);
        }

        /* TEXT */
        .card-body {
            padding: 18px;
            text-align: center;
        }

        .card-title {
            color: white;
            font-weight: 600;
        }

        .price {
            color: #ffdd59;
            font-weight: bold;
            font-size: 1.1rem;
        }

        /* QUANTITY BOX */
        .qty-box {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 12px;
        }

        /* BUTTON STYLE */
        .qty-btn {
            width: 35px;
            height: 35px;
            border-radius: 50%;
            border: none;
            font-weight: bold;
            color: white;
            background: linear-gradient(135deg, #ff758c, #ff7eb3);
            transition: 0.3s;
        }

            .qty-btn:hover {
                transform: scale(1.15);
                box-shadow: 0 0 10px #ff7eb3;
            }

        /* QTY NUMBER */
        .qty-value {
            font-size: 1.2rem;
            font-weight: bold;
            color: white;
        }

        /* TOTAL PRICE */
        .total-price {
            color: #00ffcc;
            font-size: 1.2rem;
            font-weight: bold;
            margin: 10px 0;
        }

        /* REMOVE BUTTON */
        .remove-btn {
            border-radius: 25px;
            padding: 8px;
            border: none;
            color: white;
            background: linear-gradient(135deg, #ff4e50, #f00000);
            transition: 0.3s;
        }

            .remove-btn:hover {
                transform: scale(1.05);
                box-shadow: 0 0 15px red;
            }
    </style>
</head>

<body>

    <!-- NAVBAR -->
    <nav class="navbar navbar-expand-lg navbar-dark fixed-top mb-5">
        <div class="container-fluid">
            <a class="navbar-brand fw-bold" href="index.html">Tech Shop</a>

            <button class="navbar-toggler" data-bs-toggle="collapse" data-bs-target="#nav">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse" id="nav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
                    <li class="nav-item"><a class="nav-link" href="order.html">Orders</a></li>
                    <li class="nav-item"><a class="nav-link" href="#" id="logoutLink">Logout</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- CART -->
    <div class="container-fluid mt-5 pt-5">
        <h1 class="text-center m-4 text-black fw-bold  mb-5">Your Cart</h1>

        <div id="cart-body" class="row mx-5 g-4"></div>



    </div>
    <div class="card ms-auto buy bg-danger text-white m-5 p-2" style="max-width:300px">
        <div class="card-body">
            <p class="d-flex justify-content-between">
                <span>Subtotal</span><strong id="subtotal">₹0</strong>
            </p>
            <p class="d-flex justify-content-between">
                <span>Shipping</span><strong id="shipping">₹0</strong>
            </p>
            <hr>
            <p class="d-flex justify-content-between fs-5">
                <span>Total</span><strong id="total">₹0</strong>
            </p>
            <button class="btn btn-success w-100" id="buyBtn">Buy Now</button>
        </div>
    </div>
    <script>

        const CURRENCY = '₹';
        const cartBody = document.getElementById('cart-body');
        const subtotalEl = document.getElementById('subtotal');
        const shippingEl = document.getElementById('shipping');
        const totalEl = document.getElementById('total');
        const buyBtn = document.getElementById('buyBtn');

        const user = JSON.parse(localStorage.getItem('loggedInUser'));
        const userId = localStorage.getItem('userId');

        if (!user || !userId) {
            alert('Please login');
            window.location.href = 'login.html';
        }

        // FETCH CART
        async function fetchCart() {
            try {
                const res = await fetch(`https://techshopapi.onrender.com/api/Cart/${userId}`);
                const cart = await res.json();

                cartBody.innerHTML = '';

                let subtotal = 0;

                if (cart.length === 0) {
                    cartBody.innerHTML = `
                        <div class="col-12 text-center py-5 text-white">
                            <h4>🛒 Your cart is empty</h4>
                        </div>`;
                } else {

                    cart.forEach(item => {
                        const itemTotal = item.price * item.qty;
                        subtotal += itemTotal;

                        const col = document.createElement('div');
                        col.className = "col-mx-12 col-md-2 col-sm-3 d-flex justify-content-center fade-scroll";

                        col.innerHTML = `
                            <div class="cart-card mb-3 p-4">

                                <div class="img-wrapper">
                                    <img src="${item.productImg || 'https://via.placeholder.com/150'}">
                                </div>

                                <div class="card-body text-center">
                                    <h5 class="card-title">${item.productName}</h5>
                                    <p class="price">${CURRENCY}${item.price}</p>

                                    <!-- QTY -->
                                    <div class="d-flex justify-content-center align-items-center gap-2 my-2">
                                        <button class="btn btn-outline-light btn-sm minus-btn">-</button>
                                        <span class="fw-bold text-white">${item.qty}</span>
                                        <button class="btn btn-outline-light btn-sm plus-btn">+</button>
                                    </div>

                                    <!-- TOTAL -->
                                    <p class="text-success fw-bold">${CURRENCY}${itemTotal.toFixed(2)}</p>

                                    <!-- REMOVE -->
                                    <button class="btn btn-danger btn-sm w-100 remove-btn">Remove</button>
                                </div>

                            </div>
                        `;

                        cartBody.appendChild(col);

                        // EVENTS (same logic)
                        col.querySelector('.minus-btn')
                            .addEventListener('click', () => updateQuantity(item.cartId, item.qty - 1));

                        col.querySelector('.plus-btn')
                            .addEventListener('click', () => updateQuantity(item.cartId, item.qty + 1));

                        col.querySelector('.remove-btn')
                            .addEventListener('click', () => removeFromCart(item.cartId));
                    });
                }

                // SUMMARY
                const shipping = subtotal > 0 ? +(subtotal * 0.05).toFixed(2) : 0;
                const total = subtotal + shipping;

                subtotalEl.textContent = `${CURRENCY}${subtotal.toFixed(2)}`;
                shippingEl.textContent = `${CURRENCY}${shipping.toFixed(2)}`;
                totalEl.textContent = `${CURRENCY}${total.toFixed(2)}`;

                // SCROLL ANIMATION
                setTimeout(() => {
                    document.querySelectorAll('.fade-scroll').forEach(el => {
                        observer.observe(el);
                    });
                }, 200);

            } catch (err) {
                console.error("Error fetching cart:", err);
                cartBody.innerHTML = `
                    <div class="col-12 text-center text-danger py-5">
                        Failed to load cart
                    </div>`;
            }
        }

        // SCROLL ANIMATION
        const observer = new IntersectionObserver(entries => {
            entries.forEach(e => {
                if (e.isIntersecting) {
                    e.target.classList.add('show');
                }
            });
        });

        // UPDATE QTY (unchanged)
        async function updateQuantity(cartId, newQty) {
            if (newQty < 1) return;

            try {
                const res = await fetch(`https://techshopapi.onrender.com/api/Cart/${cartId}`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ qty: newQty })
                });

                if (res.ok) {
                    fetchCart();
                } else {
                    const text = await res.text();
                    alert("Update failed: " + text);
                }
            } catch (err) {
                console.error(err);
                alert("Error updating quantity");
            }
        }

        // REMOVE (unchanged)
        async function removeFromCart(cartId) {
            try {
                const res = await fetch(`https://techshopapi.onrender.com/api/Cart/${cartId}`, {
                    method: 'DELETE'
                });
                if (res.ok) fetchCart();
            } catch (err) {
                console.error(err);
            }
        }

        // BUY (unchanged)
        async function buy() {
            const user = JSON.parse(localStorage.getItem('loggedInUser'));
            const userIdStr = localStorage.getItem('userId');
            if (!user || !userIdStr) return alert("Login required");

            try {
                const cartRes = await fetch(`https://techshopapi.onrender.com/api/Cart/${userIdStr}`);
                const cart = await cartRes.json();

                if (!cart || cart.length === 0) {
                    return alert("Your cart is empty!");
                }

                let subtotal = 0;
                cart.forEach(item => subtotal += item.price * item.qty);
                const shipping = +(subtotal * 0.05).toFixed(2);

                const res = await fetch(`https://techshopapi.onrender.com/api/Order`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        userId: parseInt(userIdStr),
                        shipping: shipping
                    })
                });

                const text = await res.text();
                if (!res.ok) {
                    alert("Order failed: " + text);
                    return;
                }

                const data = JSON.parse(text);
                const orderId = data.orderId || data;

                alert(`Order #${orderId} placed successfully!`);
                window.location.href = "order.html";

            } catch (err) {
                console.error(err);
                alert("Error placing order.");
            }
        }

        // EVENTS
        buyBtn.addEventListener('click', buy);
        window.onload = fetchCart;

        // LOGOUT
        document.addEventListener('DOMContentLoaded', function () {
            const logoutLink = document.getElementById('logoutLink');

            logoutLink.addEventListener('click', function () {
                localStorage.removeItem('loggedInUser');
                alert('Logged out successfully!');
                window.location.href = 'index.html';
            });
        });

    </script>

</body>
</html>
