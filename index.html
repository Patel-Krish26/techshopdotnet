<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Tech Store</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #ff9a9e 0%, #fad0c4 100%);
            overflow-x: hidden;
        }

        .navbar {
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(10px);
        }

        .nav-link {
            transition: 0.3s;
        }

            .nav-link:hover {
                color: #ffdd59 !important;
                transform: scale(1.1);
            }

        .banner-container {
            position: relative;
            height: 100vh;
            overflow: hidden;
        }

        .banner-image {
            width: 100%;
            height: 100%;
            object-fit: cover;
            animation: zoom 5s infinite alternate;
            filter: brightness(0.6);
        }

        @keyframes zoom {
            0% {
                transform: scale(1);
            }

            100% {
                transform: scale(1.2);
            }
        }

        .banner-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            text-align: center;
        }

        .typing {
            font-size: 2.8rem;
            font-weight: 700;
            color: white;
            white-space: nowrap;
            overflow: hidden;
            width: 0;
            animation: typing 4s steps(30,end) forwards, blink 1s infinite;
        }

        @keyframes typing {
            from {
                width: 0
            }

            to {
                width: 100%
            }
        }

        @keyframes blink {
            50% {
                border-color: transparent
            }
        }

        .banner-btn {
            margin-top: 20px;
            border-radius: 30px;
            padding: 10px 30px;
            background: linear-gradient(90deg,#ff758c,#ff7eb3);
            border: none;
            color: white;
            transition: 0.3s;
        }

            .banner-btn:hover {
                transform: scale(1.05);
            }

        /* PRODUCTS */
        .hover-card {
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            overflow: hidden;
            width: 100%;
            max-width: 300px;
            transition: 0.4s;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

            .hover-card:hover {
                transform: translateY(-10px);
                box-shadow: 0 20px 40px rgba(0,0,0,0.4);
            }

            .hover-card img {
                width: 100%;
                height: 200px;
                object-fit: contain;
                transition: 0.3s;
            }

            .hover-card:hover img {
                transform: scale(1.08);
            }

        .card-body {
            padding: 15px;
            text-align: center;
        }

            .card-body h5 {
                color: white;
                font-weight: 600;
                margin-bottom: 5px;
            }

            .card-body p {
                color: #ffdd59;
                font-weight: bold;
                margin-bottom: 10px;
            }

        .btn {
            border-radius: 20px;
            margin: 5px 0;
        }

        .fade-in {
            opacity: 0;
            transform: translateY(40px);
            transition: 0.6s;
        }

            .fade-in.show {
                opacity: 1;
                transform: translateY(0);
            }
        /* MODAL GLASS */
        .custom-modal {
            background: rgba(0,0,0,0.75);
            backdrop-filter: blur(15px);
            border-radius: 20px;
            border: 1px solid rgba(255,255,255,0.1);
        }

        /* IMAGE BOX */
        .modal-img-box {
            background: #111;
            border-radius: 15px;
            padding: 15px;
            height: 250px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

            /* IMAGE */
            .modal-img-box img {
                max-width: 100%;
                max-height: 100%;
                object-fit: contain;
                transition: 0.4s;
            }

            /* IMAGE HOVER ZOOM */
            .modal-img-box:hover img {
                transform: scale(1.1);
            }

        /* PRICE */
        .price {
            color: #ffdd59;
            font-weight: bold;
        }

        /* DESCRIPTION */
        .desc {
            color: #ccc;
            font-size: 0.95rem;
        }

        /* ADD BUTTON */
        .add-btn {
            border-radius: 25px;
            padding: 10px 30px;
            border: none;
            background: linear-gradient(135deg, #ff758c, #ff7eb3);
            color: white;
            font-weight: 600;
            transition: 0.3s;
        }

            /* HOVER EFFECT */
            .add-btn:hover {
                transform: scale(1.05);
                box-shadow: 0 0 15px #ff7eb3;
            }

        /* MODAL ANIMATION */
        .modal-content {
            animation: popup 0.4s ease;
        }

        @keyframes popup {
            from {
                transform: scale(0.8);
                opacity: 0;
            }

            to {
                transform: scale(1);
                opacity: 1;
            }
        }
    </style>
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-dark fixed-top">
        <div class="container-fluid">
            <a class="navbar-brand fw-bold" href="index.html">Tech Shop</a>
            <button class="navbar-toggler" data-bs-toggle="collapse" data-bs-target="#nav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="nav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
                    <li class="nav-item" id="navLogin"><a class="nav-link" href="login.html">Login</a></li>
                    <li class="nav-item" id="navSignup"><a class="nav-link" href="Signup.html">Signup</a></li>
                    <li class="nav-item"><a class="nav-link" href="cart.html">Cart</a></li>
                    <li class="nav-item" id="navOrder"><a class="nav-link" href="order.html">Your Orders</a></li>
                    <li class="nav-item" id="navLogout" style="display:none;">
                        <a class="nav-link" href="index.html" id="logoutLink">Logout</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- HERO -->
    <div class="banner-container">
        <img class="banner-image" src="https://static.wixstatic.com/media/84770f_93b300330b3742f2b1948ef292a91f27~mv2_d_1920_1279_s_2.png">
        <div class="banner-overlay">
            <h1 class="typing">Best Tech Products Online Shop</h1>
            <p class="text-white mt-3">Experience next-level shopping 🚀</p>
            <a class="banner-btn btn" href="#productList">Shop Now</a>
        </div>
    </div>


    <!-- PRODUCTS -->
    <div class="container mt-5">
        <h1 class="text-center my-4 text-black fw-bold text-center">Our Products</h1>

        <div id="productList" class="d-flex flex-wrap justify-content-center gap-4">

            <!-- SAMPLE PRODUCT -->
            <div class="hover-card p-4">
                <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQAgbwg5tS1gZjKQPqlIhqQb2_N2cfOwVhzJA&s" alt="SampleProduct" class="pt-4">

                <div class="card-body">
                    <h5>Sample Product</h5>
                    <p>₹</p>



                    <button class="btn btn-outline-light mt-1"
                            onclick="showProductModal(1, 'Sample Product', '', 'https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQAgbwg5tS1gZjKQPqlIhqQb2_N2cfOwVhzJA&s', 'This is static sample product, for performing operation must have MS Sql server and .Net Web API and check readme.md file for step by step guide.')">
                        View Details
                    </button>
                </div>
            </div>

        </div>
    </div>



    <div class="modal fade" id="productModal">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content custom-modal text-white">

                <!-- HEADER -->
                <div class="modal-header border-0">
                    <h5 id="productModalLabel" class="fw-bold"></h5>
                    <button class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>

                <!-- BODY -->
                <div class="modal-body text-center">

                    <div class="modal-img-box">
                        <img id="modalImg">
                    </div>

                    <h4 id="modalPrice" class="price mt-3"></h4>

                    <p id="modalDescription" class="desc"></p>

                </div>

                <!-- FOOTER -->
                <div class="modal-footer border-0 justify-content-center mb-4">
                    <button class="btn add-btn" data-bs-dismiss="modal">
                        Close
                    </button>
                </div>

            </div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {

            const loggedInUser = localStorage.getItem('loggedInUser');
            const navLogin = document.getElementById('navLogin');
            const navSignup = document.getElementById('navSignup');
            const navLogout = document.getElementById('navLogout');
            const logoutLink = document.getElementById('logoutLink');
            const order = document.getElementById('navOrder');

            if (loggedInUser) {
                navLogin.style.display = 'none';
                navSignup.style.display = 'none';
                navLogout.style.display = 'block';
                order.style.display = 'block';
            } else {
                navLogin.style.display = 'block';
                navSignup.style.display = 'block';
                navLogout.style.display = 'none';
                order.style.display = 'none';
            }

            logoutLink.addEventListener('click', function () {
                localStorage.removeItem('loggedInUser');
                localStorage.removeItem('userId');
                alert('Logged out successfully!');
                window.location.reload();
            });


        });
        const observer = new IntersectionObserver(entries => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    entry.target.classList.add('show');
                    observer.unobserve(entry.target);
                }
            });
        }, { threshold: 0.5 });

        function fadeInCards() {
            document.querySelectorAll('.fade-in').forEach(el => observer.observe(el));
        }

        const productList = document.getElementById('productList');
        let currentProduct = null;

        async function fetchProducts() {
            try {
                const res = await fetch('https://techshopapi.onrender.com/api/Product');
                const products = await res.json();

                const html = products.map(p => {
                    const name = p.productName || p.name || 'Product';
                    const price = p.price || p.Price || 0;
                    const img = p.productImg || p.imageUrl || p.img || 'https://via.placeholder.com/300x200?text=No+Image';
                    const desc = p.description || p.Description || 'Premium quality product';
                    const id = p.productId || p.ProductId || p.id;

                    return `
                <div class="hover-card fade-in p-4">
                    <img src="${img}" alt="${name}" class="pt-4">
                    <div class="card-body">
                        <h5>${name}</h5>
                        <p>₹${price}</p>
                        <button class="btn btn-outline-light" onclick="addToCart(${id})">Add to Cart</button>
                        <button class="btn btn-outline-light mt-1"
                            onclick="showProductModal(${id}, '${name.replace(/'/g, "\\'")}', ${price}, '${img}', '${desc.replace(/'/g, "\\'")}')">
                            View Details
                        </button>
                    </div>
                </div>
            `;
                }).join('');

                // ✅ IMPORTANT FIX (NO innerHTML +=)
                productList.insertAdjacentHTML('beforeend', html);

                // ✅ Re-trigger animation
                setTimeout(fadeInCards, 100);

            } catch (err) {
                console.error(err);

                productList.insertAdjacentHTML(
                    'beforeend',
                    `<div class="text-danger text-center w-100">
            Chech Sample Product Details
        </div>`
                );
            }
        }
        

        function addToCart(productId) {
            const userId = localStorage.getItem('userId');
            if (!userId) {
                alert('Please login first!');
                window.location.href = 'login.html';
                return;
            }
            fetch(`https://techshopapi.onrender.com/api/Cart?userId=${userId}&productId=${productId}`, { method: 'POST' })
                .then(res => res.text())
                .then(msg => alert(msg || 'Added to cart!'))
                .catch(() => alert('Failed to add to cart'));
        }

        function showProductModal(id, name, price, img, desc) {
            currentProduct = { productId: id, name, price };
            document.getElementById('productModalLabel').textContent = name;
            document.getElementById('modalImg').src = img;
            document.getElementById('modalPrice').textContent = `₹${price}`;
            document.getElementById('modalDescription').textContent = desc;
            new bootstrap.Modal(document.getElementById('productModal')).show();
        }

        function addCurrentToCart() {
            if (currentProduct) addToCart(currentProduct.productId);
            bootstrap.Modal.getInstance(document.getElementById('productModal')).hide();
        }

        window.onload = fetchProducts;
    </script>

</body>
</html>
